<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tools</title>
  <style>
    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --border: #3b4261;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.75rem;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 1.25rem;
      font-size: 1.35rem;
      font-weight: 600;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .links a:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tools</h1>
    <nav class="links">
      <a href="password-generator.html">Password Generator</a>
      <a href="mac-generator.html">MAC Address Generator</a>
      <a href="todo-list.html">Todo List</a>
      <a href="markdown-viewer.html">Markdown Viewer</a>
      <a href="qr-code-generator.html">QR Code Generator</a>
    </nav>
  </div>
</body>
</html>
