<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Generate random MAC-48/EUI-48 or EUI-64 addresses in your browser with format options and instant copy. Hollowcore Utils.">
  <meta property="og:site_name" content="Hollowcore Utils">
  <meta property="og:type" content="website">
  <meta property="og:title" content="MAC Address Generator — Hollowcore Utils">
  <meta property="og:description" content="Random MAC addresses with format choices—local, fast, clipboard-friendly.">
  <meta property="og:url" content="https://hollowcore.qzz.io/mac-generator.html">
  <meta property="og:image" content="https://hollowcore.qzz.io/favicon.png">
  <meta property="og:image:alt" content="Hollowcore Utils">
  <meta property="og:locale" content="en_US">
  <link rel="canonical" href="https://hollowcore.qzz.io/mac-generator.html">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <title>MAC Address Generator — Hollowcore Utils</title>
</head>
<body class="page-centered page-mac">
  <a href="index.html" class="back-btn" aria-label="Back to home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
  <div class="card card--hub">
    <header class="page-head">
      <h1>MAC Address Generator</h1>
      <p class="brand-tag">Hollowcore Utils</p>
    </header>

    <div class="field">
      <label for="format">Address format</label>
      <div class="select-wrap">
        <select id="format">
          <option value="eui48">MAC-48 / EUI-48 (6 bytes)</option>
          <option value="eui64">EUI-64 (8 bytes)</option>
        </select>
      </div>
    </div>

    <div class="field">
      <div class="group-title">Address type</div>
      <div class="row">
        <input type="radio" name="type" id="type-ug" value="ug" checked>
        <span data-for="type-ug">Unicast, global</span>
      </div>
      <div class="row">
        <input type="radio" name="type" id="type-ul" value="ul">
        <span data-for="type-ul">Unicast, local</span>
      </div>
      <div class="row">
        <input type="radio" name="type" id="type-mg" value="mg">
        <span data-for="type-mg">Multicast, global</span>
      </div>
      <div class="row">
        <input type="radio" name="type" id="type-ml" value="ml">
        <span data-for="type-ml">Multicast, local</span>
      </div>
    </div>

    <div class="field">
      <div class="group-title">String format</div>
      <div class="row">
        <input type="radio" name="stringFormat" id="sf-colon" value="colon" checked>
        <span data-for="sf-colon">XX:XX:XX:XX:XX:XX</span>
      </div>
      <div class="row">
        <input type="radio" name="stringFormat" id="sf-dash" value="dash">
        <span data-for="sf-dash">XX-XX-XX-XX-XX-XX</span>
      </div>
      <div class="row">
        <input type="radio" name="stringFormat" id="sf-dot" value="dot">
        <span data-for="sf-dot">XXXX.XXXX.XXXX</span>
      </div>
      <div class="row">
        <input type="radio" name="stringFormat" id="sf-plain" value="plain">
        <span data-for="sf-plain">XXXXXXXXXXXX</span>
      </div>
    </div>

    <div class="result-wrap">
      <input type="text" id="output" readonly placeholder="Click &quot;Generate&quot;">
      <button type="button" class="btn-copy" id="copy" title="Copy" aria-label="Copy">
        <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>

    <button type="button" class="btn btn-primary generate-btn" id="generate">Generate</button>
  </div>

  <script>
    const formatEl = document.getElementById('format');
    const typeRadios = Array.from(document.querySelectorAll('input[name="type"]'));
    const stringFormatRadios = Array.from(document.querySelectorAll('input[name="stringFormat"]'));
    const outputEl = document.getElementById('output');
    const copyBtn = document.getElementById('copy');
    const generateBtn = document.getElementById('generate');
    const copyIcon = document.getElementById('copyIcon');
    const checkIcon = document.getElementById('checkIcon');

    document.querySelectorAll('span[data-for]').forEach(span => {
      span.addEventListener('click', () => {
        const id = span.getAttribute('data-for');
        const input = document.getElementById(id);
        if (input) {
          input.checked = true;
        }
      });
    });

    function getSelectedType() {
      const checked = typeRadios.find(r => r.checked);
      return checked ? checked.value : 'ug';
    }

    function getSelectedStringFormat() {
      const checked = stringFormatRadios.find(r => r.checked);
      return checked ? checked.value : 'colon';
    }

    function generateBytes() {
      const isEui64 = formatEl.value === 'eui64';
      const length = isEui64 ? 8 : 6;
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);

      let ig = 0;
      let ul = 0;
      const type = getSelectedType();
      if (type === 'ul') {
        ig = 0;
        ul = 1;
      } else if (type === 'mg') {
        ig = 1;
        ul = 0;
      } else if (type === 'ml') {
        ig = 1;
        ul = 1;
      }

      bytes[0] = (bytes[0] & 0b11111100) | ig | (ul << 1);
      return bytes;
    }

    function formatBytes(bytes) {
      const sf = getSelectedStringFormat();
      const parts = [];
      for (let i = 0; i < bytes.length; i++) {
        const hex = bytes[i].toString(16).padStart(2, '0').toUpperCase();
        parts.push(hex);
      }
      if (sf === 'colon') {
        return parts.join(':');
      }
      if (sf === 'dash') {
        return parts.join('-');
      }
      if (sf === 'dot') {
        const hexStr = parts.join('');
        const groups = [];
        for (let i = 0; i < hexStr.length; i += 4) {
          groups.push(hexStr.slice(i, i + 4));
        }
        return groups.join('.');
      }
      return parts.join('');
    }

    function generate() {
      const bytes = generateBytes();
      const mac = formatBytes(bytes);
      outputEl.value = mac;
      outputEl.placeholder = '';
    }

    generateBtn.addEventListener('click', generate);

    copyBtn.addEventListener('click', () => {
      const text = outputEl.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copyIcon.style.display = 'none';
        checkIcon.style.display = 'block';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyIcon.style.display = 'block';
          checkIcon.style.display = 'none';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
    });

    generate();
  </script>
</body>
</html>
