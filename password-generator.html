<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Generator</title>
  <style>
    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --success: #9ece6a;
      --border: #3b4261;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.75rem;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 1.25rem;
      font-size: 1.35rem;
      font-weight: 600;
    }
    .field {
      margin-bottom: 1rem;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .row span {
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
    }
    .length-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }
    .length-row input[type="range"] {
      flex: 1;
      height: 6px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .length-row output {
      min-width: 2.5rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }
    .result-wrap {
      position: relative;
      margin-top: 1.25rem;
    }
    .result-wrap input[type="text"] {
      width: 100%;
      padding: 0.65rem 2.75rem 0.65rem 0.85rem;
      font-size: 1rem;
      font-family: ui-monospace, monospace;
      letter-spacing: 0.05em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
    }
    .result-wrap input[type="text"]:focus {
      border-color: var(--accent);
    }
    .btn-copy {
      position: absolute;
      top: 50%;
      right: 0.35rem;
      transform: translateY(-50%);
      width: 2rem;
      height: 2rem;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .btn-copy:hover {
      color: var(--text);
      background: var(--border);
    }
    .btn-copy.copied {
      color: var(--success);
    }
    .btn-copy svg {
      width: 1.1rem;
      height: 1.1rem;
    }
    .btn {
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .generate-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Password Generator</h1>
    <div class="field">
      <div class="length-row">
        <input type="range" id="length" min="4" max="64" value="16">
        <output id="lengthVal">16</output>
      </div>
    </div>
    <div class="field">
      <div class="row">
        <input type="checkbox" id="lower" checked>
        <span for="lower">Lowercase letters (a–z)</span>
      </div>
      <div class="row">
        <input type="checkbox" id="upper" checked>
        <span for="upper">Uppercase letters (A–Z)</span>
      </div>
      <div class="row">
        <input type="checkbox" id="digits" checked>
        <span for="digits">Digits (0–9)</span>
      </div>
      <div class="row">
        <input type="checkbox" id="special" checked>
        <span for="special">Special characters (!@#$%…)</span>
      </div>
    </div>
    <div class="result-wrap">
      <input type="text" id="output" readonly placeholder="Click &quot;Generate&quot;">
      <button type="button" class="btn-copy" id="copy" title="Copy" aria-label="Copy">
        <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <button type="button" class="btn btn-primary generate-btn" id="generate">Generate</button>
  </div>
  <script>
    const LOWER = 'abcdefghijklmnopqrstuvwxyz';
    const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const DIGITS = '0123456789';
    const SPECIAL = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    const lengthEl = document.getElementById('length');
    const lengthVal = document.getElementById('lengthVal');
    const lowerEl = document.getElementById('lower');
    const upperEl = document.getElementById('upper');
    const digitsEl = document.getElementById('digits');
    const specialEl = document.getElementById('special');
    const outputEl = document.getElementById('output');
    const copyBtn = document.getElementById('copy');
    const generateBtn = document.getElementById('generate');

    lengthEl.addEventListener('input', () => {
      lengthVal.textContent = lengthEl.value;
    });

    function getPool() {
      let pool = '';
      if (lowerEl.checked) pool += LOWER;
      if (upperEl.checked) pool += UPPER;
      if (digitsEl.checked) pool += DIGITS;
      if (specialEl.checked) pool += SPECIAL;
      return pool;
    }

    function generate() {
      const pool = getPool();
      const len = parseInt(lengthEl.value, 10);
      if (!pool) {
        outputEl.value = '';
        outputEl.placeholder = 'Empty';
        return;
      }
      let result = '';
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      for (let i = 0; i < len; i++) {
        result += pool[arr[i] % pool.length];
      }
      outputEl.value = result;
      outputEl.placeholder = '';
    }

    generateBtn.addEventListener('click', generate);

    const copyIcon = document.getElementById('copyIcon');
    const checkIcon = document.getElementById('checkIcon');
    copyBtn.addEventListener('click', () => {
      const text = outputEl.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copyIcon.style.display = 'none';
        checkIcon.style.display = 'block';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyIcon.style.display = 'block';
          checkIcon.style.display = 'none';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
    });

    generate();
  </script>
</body>
</html>
