<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Generate secure random passwords in your browser with adjustable length and lowercase, uppercase, numbers, and symbols. Copy in one tap. Hollowcore Utils.">
  <meta property="og:site_name" content="Hollowcore Utils">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Password Generator — Hollowcore Utils">
  <meta property="og:description" content="Strong random passwords with full control over length and character sets—runs locally in your browser.">
  <meta property="og:url" content="https://hollowcore.qzz.io/password-generator.html">
  <meta property="og:image" content="https://hollowcore.qzz.io/favicon.png">
  <meta property="og:image:alt" content="Hollowcore Utils">
  <meta property="og:locale" content="en_US">
  <link rel="canonical" href="https://hollowcore.qzz.io/password-generator.html">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <title>Password Generator — Hollowcore Utils</title>
</head>
<body class="page-centered page-password">
  <a href="index.html" class="back-btn" aria-label="Back to home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
  <div class="card card--hub">
    <header class="page-head">
      <h1>Password Generator</h1>
      <p class="brand-tag">Hollowcore Utils</p>
    </header>
    <div class="field">
      <div class="length-row">
        <input type="range" id="length" min="4" max="64" value="16">
        <output id="lengthVal">16</output>
      </div>
    </div>
    <div class="field">
      <div class="row">
        <input type="checkbox" id="lower" checked>
        <span for="lower">Lowercase letters (a–z)</span>
      </div>
      <div class="row">
        <input type="checkbox" id="upper" checked>
        <span for="upper">Uppercase letters (A–Z)</span>
      </div>
      <div class="row">
        <input type="checkbox" id="digits" checked>
        <span for="digits">Digits (0–9)</span>
      </div>
      <div class="row">
        <input type="checkbox" id="special" checked>
        <span for="special">Special characters (!@#$%…)</span>
      </div>
    </div>
    <div class="result-wrap">
      <input type="text" id="output" readonly placeholder="Click &quot;Generate&quot;">
      <button type="button" class="btn-copy" id="copy" title="Copy" aria-label="Copy">
        <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <button type="button" class="btn btn-primary generate-btn" id="generate">Generate</button>
  </div>
  <script>
    const LOWER = 'abcdefghijklmnopqrstuvwxyz';
    const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const DIGITS = '0123456789';
    const SPECIAL = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    const lengthEl = document.getElementById('length');
    const lengthVal = document.getElementById('lengthVal');
    const lowerEl = document.getElementById('lower');
    const upperEl = document.getElementById('upper');
    const digitsEl = document.getElementById('digits');
    const specialEl = document.getElementById('special');
    const outputEl = document.getElementById('output');
    const copyBtn = document.getElementById('copy');
    const generateBtn = document.getElementById('generate');

    lengthEl.addEventListener('input', () => {
      lengthVal.textContent = lengthEl.value;
    });

    function getPool() {
      let pool = '';
      if (lowerEl.checked) pool += LOWER;
      if (upperEl.checked) pool += UPPER;
      if (digitsEl.checked) pool += DIGITS;
      if (specialEl.checked) pool += SPECIAL;
      return pool;
    }

    function generate() {
      const pool = getPool();
      const len = parseInt(lengthEl.value, 10);
      if (!pool) {
        outputEl.value = '';
        outputEl.placeholder = 'Empty';
        return;
      }
      let result = '';
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      for (let i = 0; i < len; i++) {
        result += pool[arr[i] % pool.length];
      }
      outputEl.value = result;
      outputEl.placeholder = '';
    }

    generateBtn.addEventListener('click', generate);

    const copyIcon = document.getElementById('copyIcon');
    const checkIcon = document.getElementById('checkIcon');
    copyBtn.addEventListener('click', () => {
      const text = outputEl.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copyIcon.style.display = 'none';
        checkIcon.style.display = 'block';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyIcon.style.display = 'block';
          checkIcon.style.display = 'none';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
    });

    generate();
  </script>
</body>
</html>
