<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Code Generator</title>
  <style>
    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --border: #3b4261;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) #1f2335;
    }
    body::-webkit-scrollbar {
      width: 10px;
    }
    body::-webkit-scrollbar-track {
      background: #1f2335;
      border-radius: 999px;
    }
    body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
      border: 2px solid #1f2335;
    }
    body::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }
    .back-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--accent-hover); }
    .back-btn svg { width: 1rem; height: 1rem; }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: min(900px, 100%);
      width: 100%;
      border: 1px solid var(--border);
      margin: 3rem auto 1rem;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 1.35rem;
      font-weight: 600;
    }
    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
      align-items: start;
    }
    .pane {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      min-width: 0;
    }
    textarea, select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    textarea {
      min-height: 130px;
      resize: vertical;
      padding: 0.65rem 0.75rem;
      font: inherit;
      scrollbar-width: thin;
      scrollbar-color: var(--border) #1f2335;
    }
    textarea::-webkit-scrollbar {
      width: 10px;
    }
    textarea::-webkit-scrollbar-track {
      background: #1f2335;
      border-radius: 999px;
    }
    textarea::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
      border: 2px solid #1f2335;
    }
    textarea::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }
    select, input[type="text"] {
      padding: 0.55rem 0.7rem;
      font-size: 0.95rem;
    }
    textarea:focus, select:focus, input[type="text"]:focus { border-color: var(--accent); }
    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 520px) {
      .color-row { grid-template-columns: 1fr; }
    }
    .color-control {
      position: relative;
    }
    .color-inline {
      position: relative;
      display: flex;
      align-items: center;
    }
    .color-inline input[type="text"] {
      font-weight: 600;
      text-transform: uppercase;
    }
    .cp-popover {
      position: absolute;
      z-index: 20;
      left: 0;
      top: calc(100% + 0.45rem);
      width: min(260px, 100vw - 3rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }
    .cp-sv {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
      touch-action: none;
    }
    .cp-sv-cursor {
      position: absolute;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    .cp-hue {
      margin-top: 0.55rem;
      position: relative;
      height: 16px;
      border-radius: 999px;
      cursor: ew-resize;
      touch-action: none;
      background: linear-gradient(90deg, #ff0000 0%, #ffff00 16.66%, #00ff00 33.33%, #00ffff 50%, #0000ff 66.66%, #ff00ff 83.33%, #ff0000 100%);
    }
    .cp-hue-cursor {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    .cp-value {
      margin-top: 0.55rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .file-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    input[type="file"] {
      max-width: 100%;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 0.55rem 0.8rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      border-color: var(--border);
      color: var(--muted);
    }
    .preview {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      width: 100%;
      max-width: 320px;
      justify-self: center;
    }
    #qrMount {
      width: min(280px, 100%);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    #qrMount canvas,
    #qrMount svg,
    #qrMount img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      width: min(280px, 100%);
      align-self: center;
      align-items: stretch;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.32rem;
      width: 64px;
      height: 28px;
      padding: 0 0.5rem;
      font-size: 0.78rem;
      line-height: 1;
    }
    .download-btn svg {
      width: 0.78rem;
      height: 0.78rem;
      flex: 0 0 auto;
    }
    .err {
      margin: 0;
      min-height: 1.2em;
      color: #f7768e;
      font-size: 0.85rem;
      text-align: right;
    }
  </style>
  <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>
  <a href="index.html" class="back-btn" aria-label="Back to home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
  <div class="card">
    <h1>QR Code Generator</h1>
    <div class="split">
      <div class="pane">
        <div class="field">
          <textarea id="content" aria-label="Text / URL / command"></textarea>
        </div>
        <div class="field">
          <select id="styleType" aria-label="Style">
            <option value="standard" selected>Standard</option>
            <option value="rounded">Rounded</option>
            <option value="dots">Dots</option>
            <option value="classy">Classy</option>
          </select>
        </div>
        <div class="color-row">
          <div class="field">
            <div class="color-control" id="fgControl">
              <div class="color-inline">
                <input type="text" id="fgHex" value="#000000" spellcheck="false" autocomplete="off" maxlength="7" aria-label="QR color">
              </div>
              <div class="cp-popover" id="fgPicker" hidden>
                <div class="cp-sv" id="fgSv">
                  <span class="cp-sv-cursor" id="fgSvCursor"></span>
                </div>
                <div class="cp-hue" id="fgHue">
                  <span class="cp-hue-cursor" id="fgHueCursor"></span>
                </div>
                <div class="cp-value" id="fgInfo"></div>
              </div>
            </div>
          </div>
          <div class="field">
            <div class="color-control" id="bgControl">
              <div class="color-inline">
                <input type="text" id="bgHex" value="#ffffff" spellcheck="false" autocomplete="off" maxlength="7" aria-label="Background color">
              </div>
              <div class="cp-popover" id="bgPicker" hidden>
                <div class="cp-sv" id="bgSv">
                  <span class="cp-sv-cursor" id="bgSvCursor"></span>
                </div>
                <div class="cp-hue" id="bgHue">
                  <span class="cp-hue-cursor" id="bgHueCursor"></span>
                </div>
                <div class="cp-value" id="bgInfo"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="file-row">
            <input type="file" id="logo" accept="image/*" aria-label="Center logo">
            <button type="button" class="btn" id="clearLogo">Clear</button>
          </div>
        </div>
      </div>
      <div class="preview">
        <div id="qrMount" class="empty"></div>
        <div class="actions">
          <button type="button" class="btn download-btn" id="downloadPng" disabled aria-label="Download PNG">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
            PNG
          </button>
          <button type="button" class="btn download-btn" id="downloadSvg" disabled aria-label="Download SVG">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
            SVG
          </button>
        </div>
        <p class="err" id="qrErr"></p>
      </div>
    </div>
  </div>
  <script>
    const STYLE_PRESETS = {
      standard: { dots: 'square', cornerSquare: 'square', cornerDot: 'square' },
      rounded: { dots: 'rounded', cornerSquare: 'extra-rounded', cornerDot: 'dot' },
      dots: { dots: 'dots', cornerSquare: 'dots', cornerDot: 'dots' },
      classy: { dots: 'classy', cornerSquare: 'classy', cornerDot: 'classy' }
    };

    const contentEl = document.getElementById('content');
    const styleType = document.getElementById('styleType');
    const fgHex = document.getElementById('fgHex');
    const bgHex = document.getElementById('bgHex');
    const fgControl = document.getElementById('fgControl');
    const bgControl = document.getElementById('bgControl');
    const logoInput = document.getElementById('logo');
    const clearLogo = document.getElementById('clearLogo');
    const qrMount = document.getElementById('qrMount');
    const qrErr = document.getElementById('qrErr');
    const downloadPng = document.getElementById('downloadPng');
    const downloadSvg = document.getElementById('downloadSvg');

    let qrCode = null;
    let logoDataUrl = '';
    let renderFrame = 0;
    let activePicker = null;
    let qrLibraryLoader = null;

    const MAX_LOGO_BYTES = 2 * 1024 * 1024;
    const QR_RENDER_SIZE = 280;
    const ALLOWED_LOGO_TYPES = new Set([
      'image/png',
      'image/jpeg',
      'image/webp',
      'image/gif',
      'image/svg+xml'
    ]);

    function setError(text) {
      qrErr.textContent = text;
    }

    function setDownloadState(enabled) {
      downloadPng.disabled = !enabled;
      downloadSvg.disabled = !enabled;
    }

    function ensureQrLibrary() {
      if (typeof window.QRCodeStyling === 'function') return Promise.resolve(true);
      if (qrLibraryLoader) return qrLibraryLoader;
      qrLibraryLoader = new Promise((resolve) => {
        const fallback = document.createElement('script');
        fallback.src = 'https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js';
        fallback.onload = () => resolve(typeof window.QRCodeStyling === 'function');
        fallback.onerror = () => resolve(false);
        document.head.appendChild(fallback);
      });
      return qrLibraryLoader;
    }

    function normalizeHex(value, fallback) {
      let v = value.trim();
      if (!v.startsWith('#')) v = `#${v}`;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) return v.toLowerCase();
      return fallback;
    }

    function hexToRgb(hex) {
      const v = normalizeHex(hex, '#000000');
      return {
        r: parseInt(v.slice(1, 3), 16),
        g: parseInt(v.slice(3, 5), 16),
        b: parseInt(v.slice(5, 7), 16)
      };
    }

    function rgbToHex(r, g, b) {
      return `#${[r, g, b].map((x) => x.toString(16).padStart(2, '0')).join('')}`;
    }

    function getInputTextColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 160 ? '#111827' : '#f8fafc';
    }

    function setInputColorAppearance(input, hex) {
      input.style.background = hex;
      input.style.color = getInputTextColor(hex);
      input.style.borderColor = hex;
    }

    function rgbToHsv(r, g, b) {
      const rr = r / 255;
      const gg = g / 255;
      const bb = b / 255;
      const max = Math.max(rr, gg, bb);
      const min = Math.min(rr, gg, bb);
      const d = max - min;
      let h = 0;
      if (d !== 0) {
        if (max === rr) h = ((gg - bb) / d) % 6;
        else if (max === gg) h = (bb - rr) / d + 2;
        else h = (rr - gg) / d + 4;
        h *= 60;
        if (h < 0) h += 360;
      }
      const s = max === 0 ? 0 : d / max;
      const v = max;
      return { h, s, v };
    }

    function hsvToRgb(h, s, v) {
      const c = v * s;
      const hh = h / 60;
      const x = c * (1 - Math.abs((hh % 2) - 1));
      let r = 0;
      let g = 0;
      let b = 0;
      if (hh >= 0 && hh < 1) { r = c; g = x; b = 0; }
      else if (hh < 2) { r = x; g = c; b = 0; }
      else if (hh < 3) { r = 0; g = c; b = x; }
      else if (hh < 4) { r = 0; g = x; b = c; }
      else if (hh < 5) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }
      const m = v - c;
      return {
        r: Math.round((r + m) * 255),
        g: Math.round((g + m) * 255),
        b: Math.round((b + m) * 255)
      };
    }

    function clamp01(n) {
      return Math.max(0, Math.min(1, n));
    }

    function clamp360(n) {
      if (n < 0) return 0;
      if (n > 360) return 360;
      return n;
    }

    const pickerState = {
      fg: {
        control: fgControl,
        hexEl: fgHex,
        popover: document.getElementById('fgPicker'),
        sv: document.getElementById('fgSv'),
        svCursor: document.getElementById('fgSvCursor'),
        hue: document.getElementById('fgHue'),
        hueCursor: document.getElementById('fgHueCursor'),
        info: document.getElementById('fgInfo'),
        h: 0,
        s: 1,
        v: 1
      },
      bg: {
        control: bgControl,
        hexEl: bgHex,
        popover: document.getElementById('bgPicker'),
        sv: document.getElementById('bgSv'),
        svCursor: document.getElementById('bgSvCursor'),
        hue: document.getElementById('bgHue'),
        hueCursor: document.getElementById('bgHueCursor'),
        info: document.getElementById('bgInfo'),
        h: 0,
        s: 0,
        v: 1
      }
    };

    function applyPickerColor(key, triggerRender) {
      const p = pickerState[key];
      const rgb = hsvToRgb(p.h, p.s, p.v);
      const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
      p.hexEl.value = hex;
      setInputColorAppearance(p.hexEl, hex);
      p.sv.style.background = `linear-gradient(to top, #000000, transparent), linear-gradient(to right, #ffffff, hsl(${p.h}, 100%, 50%))`;
      p.svCursor.style.left = `${p.s * 100}%`;
      p.svCursor.style.top = `${(1 - p.v) * 100}%`;
      p.hueCursor.style.left = `${(p.h / 360) * 100}%`;
      p.info.textContent = hex.toUpperCase();
      if (triggerRender) render();
    }

    function setPickerFromHex(key, value, triggerRender) {
      const p = pickerState[key];
      const hex = normalizeHex(value, p.hexEl.value || '#000000');
      const rgb = hexToRgb(hex);
      const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
      p.h = hsv.h;
      p.s = hsv.s;
      p.v = hsv.v;
      p.hexEl.value = hex;
      applyPickerColor(key, triggerRender);
    }

    function openPicker(key) {
      Object.keys(pickerState).forEach((k) => {
        pickerState[k].popover.hidden = k !== key;
      });
      activePicker = key;
    }

    function closePickers() {
      Object.keys(pickerState).forEach((k) => {
        pickerState[k].popover.hidden = true;
      });
      activePicker = null;
    }

    function bindHue(key) {
      const p = pickerState[key];
      const move = (clientX) => {
        const rect = p.hue.getBoundingClientRect();
        if (!rect.width) return;
        const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
        p.h = clamp360((x / rect.width) * 360);
        applyPickerColor(key, true);
      };
      const onPointerDown = (e) => {
        move(e.clientX);
        const onPointerMove = (ev) => move(ev.clientX);
        const onPointerUp = () => {
          window.removeEventListener('pointermove', onPointerMove);
          window.removeEventListener('pointerup', onPointerUp);
        };
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
      };
      p.hue.addEventListener('pointerdown', onPointerDown);
    }

    function bindSv(key) {
      const p = pickerState[key];
      const move = (clientX, clientY) => {
        const rect = p.sv.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
        const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
        p.s = clamp01(x / rect.width);
        p.v = clamp01(1 - y / rect.height);
        applyPickerColor(key, true);
      };
      const onPointerDown = (e) => {
        move(e.clientX, e.clientY);
        const onPointerMove = (ev) => move(ev.clientX, ev.clientY);
        const onPointerUp = () => {
          window.removeEventListener('pointermove', onPointerMove);
          window.removeEventListener('pointerup', onPointerUp);
        };
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
      };
      p.sv.addEventListener('pointerdown', onPointerDown);
    }

    Object.keys(pickerState).forEach((key) => {
      const p = pickerState[key];
      p.hexEl.addEventListener('focus', () => {
        openPicker(key);
      });
      p.hexEl.addEventListener('click', () => {
        openPicker(key);
      });
      p.hexEl.addEventListener('input', () => {
        const value = p.hexEl.value.trim();
        if (/^#?[0-9a-fA-F]{6}$/.test(value)) {
          setPickerFromHex(key, value, true);
        }
      });
      p.hexEl.addEventListener('change', () => {
        setPickerFromHex(key, p.hexEl.value, true);
      });
      bindHue(key);
      bindSv(key);
    });

    document.addEventListener('pointerdown', (e) => {
      if (!activePicker) return;
      const p = pickerState[activePicker];
      if (!p.control.contains(e.target)) closePickers();
    });

    function getOptions(text) {
      const fg = normalizeHex(fgHex.value, '#000000');
      const bg = normalizeHex(bgHex.value, '#ffffff');
      const style = STYLE_PRESETS[styleType.value] || STYLE_PRESETS.standard;
      const hasLogo = Boolean(logoDataUrl);
      const options = {
        width: QR_RENDER_SIZE,
        height: QR_RENDER_SIZE,
        type: 'svg',
        data: text,
        margin: 8,
        qrOptions: {
          errorCorrectionLevel: hasLogo ? 'H' : 'Q'
        },
        dotsOptions: {
          color: fg,
          type: style.dots
        },
        cornersSquareOptions: {
          color: fg,
          type: style.cornerSquare
        },
        cornersDotOptions: {
          color: fg,
          type: style.cornerDot
        },
        backgroundOptions: {
          color: bg
        },
        imageOptions: {
          hideBackgroundDots: true,
          imageSize: 0.3,
          margin: 4,
          saveAsBlob: true
        }
      };
      if (hasLogo) options.image = logoDataUrl;
      return options;
    }

    function render() {
      setError('');
      const text = contentEl.value.trim();
      if (!text) {
        qrMount.classList.add('empty');
        qrMount.innerHTML = '';
        qrCode = null;
        setDownloadState(false);
        return;
      }
      if (typeof window.QRCodeStyling !== 'function') {
        qrMount.classList.add('empty');
        qrMount.innerHTML = '';
        qrCode = null;
        setDownloadState(false);
        setError('Failed to load QR code library');
        return;
      }
      qrMount.classList.remove('empty');
      const options = getOptions(text);
      try {
        if (!qrCode) {
          qrCode = new QRCodeStyling(options);
          qrMount.innerHTML = '';
          qrCode.append(qrMount);
        } else {
          qrCode.update(options);
        }
        setDownloadState(true);
      } catch (error) {
        qrCode = null;
        qrMount.classList.add('empty');
        qrMount.innerHTML = '';
        setDownloadState(false);
        setError(error && error.message ? error.message : 'Generation error');
      }
    }

    function scheduleRender() {
      if (renderFrame) cancelAnimationFrame(renderFrame);
      renderFrame = requestAnimationFrame(() => {
        renderFrame = 0;
        render();
      });
    }

    contentEl.addEventListener('input', scheduleRender);
    styleType.addEventListener('change', render);

    logoInput.addEventListener('change', () => {
      const file = logoInput.files && logoInput.files[0];
      if (!file) return;
      if (!ALLOWED_LOGO_TYPES.has(file.type)) {
        logoInput.value = '';
        logoDataUrl = '';
        setError('Supported formats: PNG, JPG, WEBP, GIF, SVG');
        render();
        return;
      }
      if (file.size > MAX_LOGO_BYTES) {
        logoInput.value = '';
        logoDataUrl = '';
        setError('Logo size must be up to 2 MB');
        render();
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        logoDataUrl = typeof reader.result === 'string' ? reader.result : '';
        render();
      };
      reader.onerror = () => {
        logoInput.value = '';
        logoDataUrl = '';
        setError('Failed to read logo file');
        render();
      };
      reader.readAsDataURL(file);
    });

    clearLogo.addEventListener('click', () => {
      logoInput.value = '';
      logoDataUrl = '';
      render();
    });

    function handleDownload(extension) {
      if (!qrCode || !contentEl.value.trim()) {
        setError('Enter data for the QR code first');
        return;
      }
      qrCode.download({ name: 'qr', extension });
    }

    downloadPng.addEventListener('click', () => handleDownload('png'));
    downloadSvg.addEventListener('click', () => handleDownload('svg'));

    async function initialize() {
      setDownloadState(false);
      setPickerFromHex('fg', '#000000', false);
      setPickerFromHex('bg', '#ffffff', false);
      const libraryReady = await ensureQrLibrary();
      if (!libraryReady) {
        setError('QR code library is unavailable, check your connection');
        return;
      }
      render();
    }

    initialize();
  </script>
</body>
</html>
